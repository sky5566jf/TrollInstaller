name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos (Linux)
        uses: Randomblock1/theos-action@v1

      - name: Build app (FAT binary)
        run: |
          export THEOS_DONT_CODE_SIGN=1
          make messages=yes 2>&1 | tee /tmp/make.log
          MAKE_EXIT=${PIPESTATUS[0]}
          echo "MAKE_EXIT=${MAKE_EXIT}"
          if [ "$MAKE_EXIT" != "0" ]; then
            echo "::error::make failed with exit code ${MAKE_EXIT}"
            tail -40 /tmp/make.log
            exit 1
          fi
          echo "=== .theos object tree (TrollInstaller) ==="
          find .theos/obj -maxdepth 4 -type f -name TrollInstaller | sort || true
          echo "=== .theos object tree (trollserver) ==="
          find .theos/obj -maxdepth 4 -type f -name trollserver | sort || true
          echo "=== .theos .app dirs ==="
          find .theos -maxdepth 4 -type d -name '*.app' | sort || true

      - name: Assemble & package .tipa
        run: |
          set -e
          # 主 App 的 FAT 二进制（.app 目录）
          APP=$(find .theos -type d -name 'TrollInstaller.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::TrollInstaller.app not found under .theos/"
            find .theos -maxdepth 4 -type d | head -50
            exit 1
          fi
          # 守护进程二进制（TOOL_NAME=trollserver）
          TOOL=$(find .theos -type f -name 'trollserver' | head -n 1)
          if [ -z "$TOOL" ]; then
            echo "::error::trollserver binary not found under .theos/"
            exit 1
          fi
          echo "APP dir : $APP"
          echo "TOOL    : $TOOL ($(stat -c%s "$TOOL") bytes)"
          file "$APP/TrollInstaller" || true

          rm -rf stage Payload
          mkdir -p stage/TrollInstaller.app
          cp "$APP/TrollInstaller"                stage/TrollInstaller.app/TrollInstaller
          cp Info.plist                           stage/TrollInstaller.app/Info.plist
          cp AppIcon.png                          stage/TrollInstaller.app/AppIcon.png
          cp com.matisu.trollserver.plist         stage/TrollInstaller.app/com.matisu.trollserver.plist
          cp "$TOOL"                              stage/TrollInstaller.app/trollserver

          # setuid root：使 App 可提权安装守护进程（TrollStore 安装为 root:wheel 并保留 setuid 位）
          chmod 4755 stage/TrollInstaller.app/TrollInstaller
          chmod 4755 stage/TrollInstaller.app/trollserver

          # 完整性校验：缺任一文件都不许出包
          for f in TrollInstaller Info.plist AppIcon.png com.matisu.trollserver.plist trollserver; do
            test -e "stage/TrollInstaller.app/$f" || { echo "::error::missing $f in .app"; exit 1; }
          done
          test -s stage/TrollInstaller.app/TrollInstaller || { echo "::error::app binary empty"; exit 1; }

          mkdir -p Payload
          cp -R stage/TrollInstaller.app Payload/
          zip -r TrollInstaller.tipa Payload
          echo "=== final .tipa contents ==="
          unzip -l TrollInstaller.tipa
          rm -rf stage Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
