name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          git clone --depth 1 https://github.com/theos/sdks "$THEOS/sdks"

      - name: Build app (.app)
        run: make

      - name: Package .tipa
        run: |
          APP=$(find .theos -type d -name '*.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::App bundle not found under .theos/"
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "TrollInstaller.tipa" Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
