name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos (Linux)
        uses: Randomblock1/theos-action@v1

      - name: Build app (.app)
        run: |
          export THEOS_DONT_CODE_SIGN=1
          make

      - name: Package .tipa
        run: |
          APP=$(find .theos -type d -name '*.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::App bundle not found under .theos/"
            find .theos -maxdepth 3 -type d | head -50
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "TrollInstaller.tipa" Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
