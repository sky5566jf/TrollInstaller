name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos (Linux)
        uses: Randomblock1/theos-action@v1

      - name: Build app (.app)
        run: |
          export THEOS_DONT_CODE_SIGN=1
          echo "=== theos env ==="
          echo "THEOS=$THEOS"
          echo "THEOS_MAKE_PATH=$THEOS_MAKE_PATH"
          ls -la "$THEOS/makefiles/" 2>&1 | head -20
          echo "=== sdks ==="
          ls "$THEOS/sdks/" 2>&1
          echo "=== make dry-run (what would it do?) ==="
          make -n all 2>&1 | head -60 || true
          echo "=== make database: instance vars ==="
          make -p -n 2>/dev/null | grep -iE "TrollInstaller|_FILES|APP_NAME|OBJ_FILES|THEOS_BUILD" | head -40 || true
          echo "=== real make (verbose) ==="
          make messages=yes 2>&1 | tee /tmp/make.log
          echo "MAKE_EXIT=${PIPESTATUS[0]}"
          echo "=== .theos tree after make ==="
          find .theos -maxdepth 4 -type d | head -60 || true

      - name: Package .tipa
        run: |
          APP=$(find .theos -type d -name '*.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::App bundle not found under .theos/"
            echo "---- make.log ----"
            cat /tmp/make.log
            echo "---- .theos tree ----"
            find .theos -maxdepth 4 | head -80
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "TrollInstaller.tipa" Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
