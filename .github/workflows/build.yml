name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      THEOS: ${{ github.workspace }}/theos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git build-essential clang make fakeroot \
            libxml2-dev libssl-dev python3 zip unzip curl
          sudo apt-get clean

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          rm -rf "$THEOS/sdks"
          git clone --depth 1 https://github.com/theos/sdks "$THEOS/sdks"

      - name: Build app (.app)
        run: |
          export PATH="$THEOS/bin:$PATH"
          export THEOS_DONT_CODE_SIGN=1
          make

      - name: Package .tipa
        run: |
          APP=$(find .theos -type d -name '*.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::App bundle not found under .theos/"
            find .theos -maxdepth 3 -type d | head -50
            exit 1
          fi
          echo "Packaging: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r "TrollInstaller.tipa" Payload
          rm -rf Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
