name: Build TrollInstaller .tipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos (Linux)
        uses: Randomblock1/theos-action@v1

      - name: Build app & supervisor (FAT binary)
        run: |
          export THEOS_DONT_CODE_SIGN=1
          make messages=yes 2>&1 | tee /tmp/make.log
          MAKE_EXIT=${PIPESTATUS[0]}
          echo "MAKE_EXIT=${MAKE_EXIT}"
          if [ "$MAKE_EXIT" != "0" ]; then
            echo "::error::make failed with exit code ${MAKE_EXIT}"
            tail -40 /tmp/make.log
            exit 1
          fi
          echo "=== TrollInstaller binary ==="
          find .theos/obj -maxdepth 4 -type f -name TrollInstaller | sort || true
          echo "=== matisusupervisor binary ==="
          find .theos/obj -maxdepth 4 -type f -name matisusupervisor | sort || true
          echo "=== .app dirs ==="
          find .theos -maxdepth 4 -type d -name '*.app' | sort || true
          echo "=== ldid check ==="
          which ldid && ldid 2>&1 | head -1 || echo "ldid not found in PATH"

      - name: Assemble, sign & package .tipa
        run: |
          set -e
          # theos 自带 ldid（toolchain/linux/iphone/bin/ldid），加入 PATH
          export PATH="$THEOS/toolchain/linux/iphone/bin:$PATH"
          # 兜底：PATH 里仍找不到就全 theos 目录搜一个
          if ! command -v ldid &>/dev/null; then
            LDID_FOUND=$(find "$THEOS" -name ldid -type f 2>/dev/null | head -1)
            if [ -n "$LDID_FOUND" ]; then export PATH="$(dirname "$LDID_FOUND"):$PATH"; fi
          fi
          echo "ldid path: $(command -v ldid || echo 'NOT FOUND')"
          # 主 App 的 FAT 二进制（.app 目录）
          APP=$(find .theos -type d -name 'TrollInstaller.app' | head -n 1)
          if [ -z "$APP" ]; then
            echo "::error::TrollInstaller.app not found under .theos/"
            find .theos -maxdepth 4 -type d | head -50
            exit 1
          fi
          # 常驻监督器二进制
          SUP=$(find .theos -type f -name 'matisusupervisor' | head -n 1)
          if [ -z "$SUP" ]; then
            echo "::error::matisusupervisor binary not found under .theos/"
            exit 1
          fi
          echo "APP dir : $APP"
          echo "SUP     : $SUP ($(stat -c%s "$SUP") bytes)"
          file "$APP/TrollInstaller" || true
          file "$SUP" || true

          rm -rf stage Payload
          mkdir -p stage/TrollInstaller.app
          cp "$APP/TrollInstaller"     stage/TrollInstaller.app/TrollInstaller
          cp "$SUP"                    stage/TrollInstaller.app/matisusupervisor
          cp Info.plist                stage/TrollInstaller.app/Info.plist
          cp AppIcon.png               stage/TrollInstaller.app/AppIcon.png

          # ── ldid ad-hoc 签名 + 嵌入 entitlements ──
          # 这一步至关重要：entitlements (no-container / springboard.opensensitiveurl 等)
          # 让 supervisor 脱离 App 沙盒，setsid + 忽略信号才能在 App 死后生效。
          # TrollStore 利用 CoreTrust 绕过，不验证签名链，只验证签名存在 + entitlements 合法。
          if ! command -v ldid &>/dev/null; then
            echo "::error::ldid not found — cannot embed entitlements"
            exit 1
          fi
          echo "=== ldid signing TrollInstaller with Entitlements.plist ==="
          ldid -SEntitlements.plist stage/TrollInstaller.app/TrollInstaller
          echo "=== ldid signing matisusupervisor with supervisor.entitlements ==="
          ldid -Ssupervisor.entitlements stage/TrollInstaller.app/matisusupervisor
          echo "=== verifying entitlements embedded ==="
          ldid -e stage/TrollInstaller.app/matisusupervisor | head -5 || true

          # 权限（不需要 setuid — resident supervisor 不依赖 root 提权）
          chmod 0755 stage/TrollInstaller.app/TrollInstaller
          chmod 0755 stage/TrollInstaller.app/matisusupervisor

          # 完整性校验：缺任一文件都不许出包
          for f in TrollInstaller matisusupervisor Info.plist AppIcon.png; do
            test -e "stage/TrollInstaller.app/$f" || { echo "::error::missing $f in .app"; exit 1; }
          done
          test -s stage/TrollInstaller.app/TrollInstaller || { echo "::error::app binary empty"; exit 1; }
          test -s stage/TrollInstaller.app/matisusupervisor || { echo "::error::supervisor binary empty"; exit 1; }

          mkdir -p Payload
          cp -R stage/TrollInstaller.app Payload/
          zip -r TrollInstaller.tipa Payload
          echo "=== final .tipa contents ==="
          unzip -l TrollInstaller.tipa
          rm -rf stage Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrollInstaller.tipa
          path: TrollInstaller.tipa
